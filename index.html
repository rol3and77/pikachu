<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피카츄어 번역기</title>
  <style>
    :root {
      --bg: #fff8d6;
      --card: #ffffff;
      --main: #ffd43b;
      --main-dark: #f2b705;
      --brown: #5c3b18;
      --soft: #fff0a8;
      --line: #f0d46a;
      --text: #2b241b;
      --muted: #75684f;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, #fff2a8 0, transparent 35%),
        radial-gradient(circle at bottom right, #ffe066 0, transparent 30%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: min(100%, 920px);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 32px;
      box-shadow: 0 24px 80px rgba(90, 63, 0, 0.18);
      overflow: hidden;
    }

    header {
      padding: 36px 36px 24px;
      background: linear-gradient(135deg, #ffe066, #fff3bf);
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--brown);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 54px);
      letter-spacing: -0.06em;
      color: var(--brown);
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      max-width: 680px;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 28px;
    }

    .panel {
      background: var(--card);
      border: 1px solid #f1e0a4;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(92, 59, 24, 0.08);
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 19px;
      font-weight: 800;
      color: var(--brown);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 2px solid #f1df94;
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      line-height: 1.6;
      outline: none;
      color: var(--text);
      background: #fffdf3;
      transition: 0.2s;
    }

    textarea:focus {
      border-color: var(--main-dark);
      box-shadow: 0 0 0 4px rgba(255, 212, 59, 0.22);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--main);
      color: var(--brown);
      box-shadow: 0 8px 18px rgba(242, 183, 5, 0.28);
    }

    .primary:hover {
      background: #ffc107;
    }

    .secondary {
      background: #f7f1db;
      color: #6a5528;
    }

    .result-box {
      min-height: 210px;
      background: #fffdf3;
      border: 2px dashed #ead17d;
      border-radius: 18px;
      padding: 16px;
    }

    .empty {
      color: var(--muted);
      line-height: 1.6;
    }

    .sentence-card {
      padding: 16px;
      border-radius: 18px;
      background: #ffffff;
      border: 2px solid var(--main);
      margin-bottom: 14px;
      box-shadow: 0 8px 18px rgba(242, 183, 5, 0.14);
    }

    .sentence-title {
      font-size: 13px;
      font-weight: 900;
      color: #8a6a00;
      margin-bottom: 6px;
    }

    .sentence-text {
      font-size: 18px;
      font-weight: 900;
      color: var(--brown);
      line-height: 1.6;
    }

    .match-card {
      padding: 14px 14px 16px;
      border-radius: 16px;
      background: #fff5bf;
      border: 1px solid #efd56f;
      margin-bottom: 12px;
    }

    .match-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .pika-word {
      font-size: 18px;
      font-weight: 900;
      color: var(--brown);
      word-break: break-word;
    }

    .tag {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 9px;
      border-radius: 999px;
      background: white;
      color: #8a6a00;
      border: 1px solid #ecd276;
    }

    .meaning {
      margin: 0;
      line-height: 1.6;
      color: #3b3122;
    }

    .meaning ul {
      margin: 6px 0 0;
      padding-left: 20px;
    }

    .unknown {
      background: #fff1f1;
      border-color: #ffc9c9;
    }

    .unknown .tag {
      color: #c92a2a;
      border-color: #ffc9c9;
    }

    .quick-list {
      grid-column: 1 / -1;
      background: #fffdf3;
      border: 1px solid #f1e0a4;
      border-radius: 24px;
      padding: 22px;
    }

    .quick-list h2 {
      margin: 0 0 14px;
      font-size: 20px;
      color: var(--brown);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid #ecd276;
      background: white;
      color: #6a5528;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }

    .chip:hover {
      background: var(--soft);
      transform: translateY(-1px);
    }

    footer {
      padding: 0 28px 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      header {
        padding: 28px 22px 20px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 20px;
      }

      footer {
        padding: 0 20px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="badge">⚡ 사전 기반 번역기</div>
      <h1>피카츄어 번역기</h1>
      <p class="subtitle">
        피카츄가 말한 표현을 입력하면 한국어 뜻을 찾아줍니다. 여러 뜻이 있는 표현은 가능한 해석을 함께 보여줍니다.
      </p>
    </header>

    <main>
      <section class="panel">
        <h2 class="panel-title">입력</h2>
        <textarea id="input" placeholder="예: 피캇츄~!\n예: 피카! 피카피\n예: 피이카츄우우우우우"></textarea>
        <div class="actions">
          <button class="primary" id="translateBtn">해석하기</button>
          <button class="secondary" id="clearBtn">지우기</button>
          <button class="secondary" id="sampleBtn">예시 넣기</button>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">해석 결과</h2>
        <div class="result-box" id="result">
          <div class="empty">피카츄어를 입력하면 결과가 여기에 표시됩니다.</div>
        </div>
      </section>

      <section class="quick-list">
        <h2>빠른 입력</h2>
        <div class="chips" id="chips"></div>
      </section>
    </main>

    <footer>
      이 번역기는 입력된 사전 규칙을 기반으로 작동합니다. 같은 표현에 여러 뜻이 있는 경우 문맥에 따라 후보를 함께 표시합니다.
    </footer>
  </div>

  <script>
    const pikaDictionary = {
      "피캇츄~!": ["안녕!"],
      "피카피": ["한지우(사토시)"],
      "피피피~!": ["토게피"],
      "피핏카츄": ["로켓단 삼인방", "로사", "로이", "나옹"],
      "핏피카츄~!": ["넌 내꺼야!", "지우가 배지, Z크리스탈, 새로운 포켓몬을 얻었을 때의 표현"],
      "피카츄피": ["최이슬"],
      "피카츄": ["웅이", "데덴네"],
      "피피카": ["봄이"],
      "피카카": ["나빛나"],
      "피-카-": ["세레나"],
      "피-카츄": ["미안해"],
      "피-카-츄~?": ["괜찮아?"],
      "피카?": ["?", "질문"],
      "피카카피카": ["이상해씨"],
      "피카피카": ["꼬부기", "파이리", "라프라스", "코코리", "갸라도스", "아공이", "가재군", "이어롤", "핑복", "수댕이", "맘모꾸리", "터검니", "화살꼬빈"],
      "피카-피카": ["리자몽", "메리(니드런 암컷)"],
      "피카-피카!": ["작별 인사"],
      "피카-카": ["코산호", "몽얌나"],
      "피카, 피카츄!": ["난 피카츄!"],
      "피카피-카": ["치코리타", "잉어킹", "찌르호크"],
      "피카피-카-": ["시트론"],
      "피카피카츄": ["브케인"],
      "피캇피": ["고라파덕", "야나프"],
      "피카츄우": ["버터플"],
      "핏-카-": ["푸호꼬"],
      "핏카츄": ["팽도리"],
      "챠아~!": ["기분 좋을 때"],
      "피이카-피카!": ["전투 준비 완료!"],
      "피이카츄우우우우우": ["10만볼트"],
      "피카아, 츄우우우우우": ["번개"],
      "츄우-핏카!": ["아이언테일"],
      "피카피카피카피카-피카핏-카!": ["볼트태클"],
      "피카피카피카피카-츄피!": ["일렉트릭볼"],
      "피카피카피카피카-츄핏-카!": ["일렉트릭네트"],
      "피카!": ["응!", "알았어!", "맞아!"],
      "츄-": ["아니", "싫어"],
      "피~카~?": ["뭐라고~?"],
      "피카!! 피카츄우!! 피카츄우!! 피카!!": ["스파킹기가볼트"],
      "피카!! 피카 피카 피카!!": ["울트라대시어택"],
      "피이카아!! 피카카카카카피카피카아~!!": ["1000만볼트"],
      "피피!": ["코코"]
    };

    const input = document.getElementById("input");
    const result = document.getElementById("result");
    const translateBtn = document.getElementById("translateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const chips = document.getElementById("chips");

    const quickExamples = [
      "피캇츄~! 피카피 피카!",
      "피캇츄~!",
      "피카피",
      "피카!",
      "츄-",
      "피~카~?",
      "피이카-피카!",
      "피이카츄우우우우우",
      "츄우-핏카!",
      "피카, 피카츄!",
      "피카!! 피카츄우!! 피카츄우!! 피카!!"
    ];

    quickExamples.forEach((word) => {
      const chip = document.createElement("button");
      chip.className = "chip";
      chip.textContent = word;
      chip.addEventListener("click", () => {
        input.value = word;
        translate();
      });
      chips.appendChild(chip);
    });

    function normalizeText(text) {
      return text
        .replace(/\s+/g, " ")
        .replace(/！/g, "!")
        .replace(/？/g, "?")
        .replace(/，/g, ",")
        .trim();
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getGuess(word) {
      if (word.includes("?")) return ["사전에 없지만 질문하거나 되묻는 표현일 가능성이 큼"];
      if (word.includes("!") && word.length > 12) return ["사전에 없지만 기술명 또는 강한 감정 표현일 가능성이 큼"];
      if (word.includes("!")) return ["사전에 없지만 강조, 기쁨, 놀람 계열 표현일 가능성이 큼"];
      if (word.includes("~")) return ["사전에 없지만 감정이 길게 늘어진 표현일 가능성이 큼"];
      return ["아직 사전에 없는 표현"];
    }

    function findMatches(rawText) {
      const text = normalizeText(rawText);
      const matches = [];

      if (!text) return matches;

      if (pikaDictionary[text]) {
        matches.push({ phrase: text, meanings: pikaDictionary[text], type: "exact" });
        return matches;
      }

      const dictionaryKeys = Object.keys(pikaDictionary).sort((a, b) => b.length - a.length);
      let remaining = text;

      dictionaryKeys.forEach((key) => {
        if (remaining.includes(key)) {
          matches.push({ phrase: key, meanings: pikaDictionary[key], type: "partial" });
          remaining = remaining.replaceAll(key, " ");
        }
      });

      const leftovers = remaining
        .split(/[\n\s]+/)
        .map((item) => item.trim())
        .filter(Boolean);

      leftovers.forEach((item) => {
        matches.push({ phrase: item, meanings: getGuess(item), type: "unknown" });
      });

      if (matches.length === 0) {
        matches.push({ phrase: text, meanings: getGuess(text), type: "unknown" });
      }

      return matches;
    }

    function renderMeaning(meanings) {
      if (meanings.length === 1) {
        return `<p class="meaning">${escapeHtml(meanings[0])}</p>`;
      }

      return `
        <div class="meaning">
          가능한 뜻
          <ul>
            ${meanings.map((meaning) => `<li>${escapeHtml(meaning)}</li>`).join("")}
          </ul>
        </div>
      `;
    }

    function makeNaturalSentence(matches) {
      const translated = matches
        .filter((match) => match.type !== "unknown")
        .map((match) => match.meanings[0])
        .filter(Boolean);

      if (translated.length < 2) return "";

      let sentence = translated[0];

      for (let i = 1; i < translated.length; i++) {
        const word = translated[i];

        if (word.includes("응") || word.includes("알았어") || word.includes("맞아")) {
          sentence += ", 알았어!";
        } else if (word.includes("아니") || word.includes("싫어")) {
          sentence += ", 아니야.";
        } else if (word.includes("미안")) {
          sentence += ", 미안해.";
        } else if (word.includes("괜찮아")) {
          sentence += ", 괜찮아?";
        } else if (word.includes("전투 준비")) {
          sentence += ", 전투 준비 완료!";
        } else if (
          word.includes("10만볼트") ||
          word.includes("번개") ||
          word.includes("아이언테일") ||
          word.includes("볼트태클") ||
          word.includes("일렉트릭") ||
          word.includes("스파킹") ||
          word.includes("울트라")
        ) {
          sentence += ", " + word + "!";
        } else {
          sentence += " " + word;
        }
      }

      return sentence;
    }

    function renderSentenceCard(matches) {
      const sentence = makeNaturalSentence(matches);
      if (!sentence) return "";

      return `
        <div class="sentence-card">
          <div class="sentence-title">문장으로 연결한 해석</div>
          <div class="sentence-text">${escapeHtml(sentence)}</div>
        </div>
      `;
    }

    function translate() {
      const rawText = input.value;
      const matches = findMatches(rawText);

      if (!rawText.trim()) {
        result.innerHTML = `<div class="empty">피카츄어를 입력하면 결과가 여기에 표시됩니다.</div>`;
        return;
      }

      result.innerHTML = renderSentenceCard(matches) + matches.map((match) => {
        const label = match.type === "exact" ? "정확히 일치" : match.type === "partial" ? "부분 해석" : "추정";
        const cardClass = match.type === "unknown" ? "match-card unknown" : "match-card";

        return `
          <div class="${cardClass}">
            <div class="match-top">
              <div class="pika-word">${escapeHtml(match.phrase)}</div>
              <div class="tag">${label}</div>
            </div>
            ${renderMeaning(match.meanings)}
          </div>
        `;
      }).join("");
    }

    translateBtn.addEventListener("click", translate);

    input.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        translate();
      }
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      translate();
      input.focus();
    });

    sampleBtn.addEventListener("click", () => {
      input.value = "피캇츄~!\n피카! 피카피\n피이카츄우우우우우";
      translate();
    });
  </script>
</body>
</html>
